version: '3.8'

services:
  # Frontend - Angular application served by nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - app-network
    restart: unless-stopped

  # Backend - Python Flask API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - app-network
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
