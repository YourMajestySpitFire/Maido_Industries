<div class="w-full h-full overflow-y-auto">
  <main class="animate-entry max-w-3xl mx-auto px-6 pt-24 pb-32 flex flex-col font-sans">
    @let post = blogPost();

    @if (post) {
      <article>
        <header class="mb-16">
          <h1 class="text-4xl font-bold tracking-tighter sm:text-5xl text-text mb-6">
            {{ post.title }}
          </h1>
          <div class="flex items-center gap-4 text-overlay">
            <time class="text-xs uppercase tracking-widest font-semibold">{{ post.date }}</time>
            <span class="h-1 w-1 rounded-full bg-surface"></span>
            <span class="text-xs uppercase tracking-widest font-semibold">Article</span>
          </div>
        </header>

        <markdown
          class="prose prose-custom dark:prose-invert max-w-none block"
          [data]="markdownContent()"
        >
        </markdown>
      </article>
    }
  </main>
</div>
