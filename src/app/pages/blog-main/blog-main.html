<div class="max-w-3xl mx-auto p-8 mt-10">
  <h1 class="text-4xl font-bold mb-8 text-text">Blog</h1>

  <div class="space-y-6">
    @for (post of posts; track post.slug) {
      <article
        class="p-6 border border-gray-200 rounded-lg hover:shadow-md transition-shadow cursor-pointer"
      >
        <a [routerLink]="['/blog', post.slug]" class="block no-underline">
          <h2 class="text-2xl font-semibold text-primary mb-2">{{ post.title }}</h2>
          <p class="text-sm text-gray-500 mb-4">{{ post.date }}</p>
          <p class="text-gray-700">{{ post.description }}</p>
        </a>
      </article>
    } @empty {
      <p class="text-gray-500">No content.</p>
    }
  </div>
</div>
