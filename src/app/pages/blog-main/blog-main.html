<div class="w-full h-full overflow-y-auto bg-base">
  <main class="layout-container layout-gap animate-entry font-sans selection:bg-surface">
    <header>
      <h1
        class="text-5xl md:text-6xl 2xl:text-9xl font-extrabold tracking-tighter text-text leading-tight"
      >
        Blog
      </h1>
    </header>

    <section class="flex flex-col space-y-8 md:space-y-10 2xl:space-y-16">
      @for (post of posts(); track post.slug; let i = $index) {
        <a
          [routerLink]="['/blog', post.slug]"
          class="animate-entry flex flex-col space-y-2 group cursor-pointer no-underline"
          [style.animation-delay.ms]="i * 80"
        >
          <div class="w-full flex flex-col">
            <p
              class="tracking-tight text-xl md:text-2xl 2xl:text-5xl font-semibold text-text group-hover:text-subtext transition-colors duration-200 leading-snug"
            >
              {{ post.title }}
            </p>

            <p
              class="text-sm md:text-base 2xl:text-2xl text-overlay font-medium tabular-nums tracking-wide"
            >
              {{ post.date }}
            </p>
          </div>
        </a>
      } @empty {
        <div class="flex flex-col items-center justify-center py-20 animate-entry">
          <p class="text-subtext text-xl 2xl:text-4xl font-semibold italic">No content found.</p>
        </div>
      }
    </section>
  </main>
</div>
